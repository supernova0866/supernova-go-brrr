<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>supernova-go-brrr</title>
  <script>if (window.innerWidth < 768) location.replace('/mobile');</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #21262d;
      --border2: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --blue: #58a6ff;
      --green: #3fb950;
      --purple: #a371f7;
      --orange: #f0883e;
      --accent: #388bfd;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Background ─────────────────────────── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(88,166,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op, 0.6); }
    }

    /* ── Layout ──────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo / Brand ────────────────────────── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
      gap: 0.5rem;
    }

    .avatar-wrap {
      position: relative;
      margin-bottom: 0.75rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #58a6ff, #a371f7, #f0883e, #3fb950, #58a6ff);
      animation: spin 6s linear infinite;
      z-index: -1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .wordmark span {
      color: var(--blue);
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .tagline::before, .tagline::after {
      content: '—';
      color: var(--border2);
    }

    /* ── Card ────────────────────────────────── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(88,166,255,0.4), transparent);
    }

    /* ── Sign in state ───────────────────────── */
    .signin-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .signin-icon {
      font-size: 2.25rem;
      margin-bottom: 0.75rem;
      display: block;
      filter: drop-shadow(0 0 12px rgba(88,166,255,0.4));
    }

    .signin-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .signin-header p {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.65rem 1.5rem;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .signin-btn:hover {
      background: #2ea043;
      transform: translateY(-1px);
    }

    .signin-btn:active { transform: translateY(0); }

    .signin-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Feature pills ───────────────────────── */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin: 1.25rem 0 0;
    }

    .pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .pill.blue  { border-color: rgba(88,166,255,0.3);  color: var(--blue);   background: rgba(88,166,255,0.07); }
    .pill.purple{ border-color: rgba(163,113,247,0.3); color: var(--purple); background: rgba(163,113,247,0.07); }
    .pill.green { border-color: rgba(63,185,80,0.3);   color: var(--green);  background: rgba(63,185,80,0.07); }
    .pill.orange{ border-color: rgba(240,136,62,0.3);  color: var(--orange); background: rgba(240,136,62,0.07); }

    /* ── Limited access state ────────────────── */
    .alert {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(247,133,0,0.08);
      border: 1px solid rgba(247,133,0,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
      color: #e3b341;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .alert-icon { flex-shrink: 0; font-size: 1rem; }

    .limited-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text);
    }

    .limited-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    /* ── Contact buttons ─────────────────────── */
    .contact-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .contact-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid;
      transition: opacity 0.15s, transform 0.1s;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .contact-btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .contact-btn:active { transform: translateY(0); }

    .contact-btn.github {
      background: var(--surface2);
      border-color: var(--border2);
      color: var(--text);
    }

    .contact-btn.discord {
      background: rgba(88,101,242,0.1);
      border-color: rgba(88,101,242,0.5);
      color: #7289da;
    }

    .contact-btn.signout {
      width: 100%;
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── Divider ─────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
      color: var(--muted);
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }

    /* ── Footer ──────────────────────────────── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .footer a {
      color: var(--blue);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .footer .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border2);
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="stars" id="stars"></div>

<div class="container">

  <div class="brand">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">
        <img id="avatar-img" alt="supernova0866"
          src="https://avatars.githubusercontent.com/u/225889294?v=4" />
      </div>
    </div>
    <div class="wordmark">supernova<span>-go-brrr</span></div>
    <div class="tagline">github profile svg generator</div>
  </div>

  <div class="card" id="main-card">
    <!-- injected by JS -->
  </div>

  <div class="footer">
    built by <a href="https://github.com/supernova0866" target="_blank">supernova0866</a>
    <div class="dot"></div>
    invite-only
  </div>

</div>

<script>
  // ── Stars ──────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:${(Math.random()*5).toFixed(1)}s;
      --op:${(Math.random()*0.5+0.2).toFixed(2)};
    `;
    starsEl.appendChild(s);
  }

  // ── Auth state ────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const limited = params.get('limited') === '1';
  const card    = document.getElementById('main-card');

  const GH_ICON = `<svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
      .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
      -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
      .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
      .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
      0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>`;

  const DC_ICON = `<img src="https://cdn.simpleicons.org/discord/7289da" width="14" height="14" alt="Discord" style="vertical-align:middle"/>`;

  fetch('/api/me')
    .then(r => r.json())
    .then(data => {
      if (data.username) {
        if (limited) {
          card.innerHTML = `
            <div class="alert">
              <span class="alert-icon">⚠️</span>
              <span><strong>@${data.username}</strong> doesn't have access yet.</span>
            </div>
            <div class="limited-title">Limited access</div>
            <div class="limited-desc">
              This tool is invite-only by design. Reach out to supernova0866 to request access.
            </div>
            <div class="contact-row">
              <a class="contact-btn github" href="https://github.com/supernova0866" target="_blank">
                ${GH_ICON} GitHub
              </a>
              <a class="contact-btn discord" href="https://discord.com/users/supernova0866" target="_blank">
                ${DC_ICON} Discord
              </a>
            </div>
            <div class="divider">or</div>
            <a class="contact-btn signout" href="/auth/logout">Sign out of @${data.username}</a>`;
        } else {
          window.location.href = '/dashboard';
        }
      } else {
        renderSignIn();
      }
    })
    .catch(() => renderSignIn());

  function renderSignIn() {
    card.innerHTML = `
      <div class="signin-header">
        <span class="signin-icon">🚀</span>
        <h2>Get started</h2>
        <p>Sign in with GitHub to access your dashboard<br/>and start generating profile cards.</p>
      </div>
      <a class="signin-btn" href="/auth/github">
        ${GH_ICON}
        Sign in with GitHub
      </a>
      <div class="features">
        <span class="pill blue">SVG cards</span>
        <span class="pill purple">Spotify</span>
        <span class="pill green">GitHub stats</span>
        <span class="pill orange">Discord</span>
        <span class="pill">banners</span>
        <span class="pill">themes</span>
      </div>`;
  }
</script>
</body>
</html>
