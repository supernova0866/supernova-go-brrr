<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>supernova-go-brrr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #21262d;
      border: 2px solid #30363d;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #58a6ff;
      font-family: monospace;
      font-weight: 700;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.82rem;
      color: #7d8590;
      margin-bottom: 2rem;
      font-family: monospace;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    /* Limited access state */
    .card.limited .icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .card.limited h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.5rem;
    }

    .card.limited p {
      font-size: 0.8rem;
      color: #7d8590;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .contact-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid;
      transition: opacity 0.15s;
      cursor: pointer;
    }

    .contact-btn:hover { opacity: 0.8; }

    .contact-btn.github {
      background: #21262d;
      border-color: #30363d;
      color: #e6edf3;
    }

    .contact-btn.discord {
      background: #5865F220;
      border-color: #5865F2;
      color: #5865F2;
    }

    /* Sign in state */
    .signin-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
      justify-content: center;
    }

    .signin-btn:hover { opacity: 0.85; }

    .signin-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
      color: #7d8590;
      font-size: 0.72rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid #21262d;
    }

    /* Signed in — limited access message */
    .alert {
      background: #f785001a;
      border: 1px solid #f7850044;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.78rem;
      color: #e3b341;
      margin-bottom: 1rem;
      text-align: left;
      line-height: 1.5;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #7d8590;
      font-family: monospace;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="avatar" id="avatar">
    <img id="avatar-img" alt="supernova0866"
      src="https://avatars.githubusercontent.com/u/225889294?v=4"
      onload="this.classList.add('loaded')" />
  </div>

  <h1>supernova-go-brrr</h1>
  <p class="tagline">github profile svg generator · limited access</p>

  <div class="card" id="main-card">
    <!-- content injected by JS based on state -->
  </div>

  <div class="footer">
    built by <a href="https://github.com/supernova0866" target="_blank">supernova0866</a>
  </div>

</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const limited = params.get('limited') === '1';
  const card    = document.getElementById('main-card');

  // Check if already signed in
  fetch('/api/me')
    .then(r => r.json())
    .then(data => {
      if (data.username) {
        // Signed in


        if (limited) {
          // Signed in but no profile — show limited access
          card.innerHTML = `
            <div class="alert">
              ⚠️ Your account (<strong>@${data.username}</strong>) doesn't have access yet.
            </div>
            <div class="icon">🔒</div>
            <h2>Limited Access</h2>
            <p>This tool is invite-only. Message supernova0866 on GitHub or Discord to request access.</p>
            <div class="contact-row">
              <a class="contact-btn github" href="https://github.com/supernova0866" target="_blank">
                <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                    -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                    .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                    -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                    .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                    .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                    0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                GitHub
              </a>
              <a class="contact-btn discord" href="https://discord.com/users/supernova0866" target="_blank">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                  <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037
                    c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0
                    0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07
                    0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057
                    19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0
                    1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077
                    0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928
                    1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292
                    a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041
                    .107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839
                    0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66
                    a.061.061 0 0 0-.031-.03z"/>
                </svg>
                Discord
              </a>
            </div>
            <div class="divider">or</div>
            <a class="contact-btn github" href="/auth/logout" style="width:100%;justify-content:center;display:flex;">
              Sign out
            </a>`;
        } else {
          // Signed in and has profile — redirect to dashboard
          window.location.href = '/dashboard';
        }
      } else {
        renderSignIn();
      }
    })
    .catch(() => renderSignIn());

  function renderSignIn() {
    card.innerHTML = `
      <div class="icon" style="font-size:2rem;margin-bottom:0.75rem;">🚀</div>
      <h2 style="font-size:0.95rem;font-weight:600;margin-bottom:0.5rem;">Sign in to continue</h2>
      <p style="font-size:0.8rem;color:#7d8590;line-height:1.6;margin-bottom:1.25rem;">
        Sign in with GitHub to check if you have access.<br/>
        If not, message supernova0866 to request it.
      </p>
      <a class="signin-btn" href="/auth/github">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13

            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Sign in with GitHub
      </a>`;
  }
</script>
</body>
</html>
