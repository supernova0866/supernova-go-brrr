<svg viewBox="0 0 300 148" xmlns="http://www.w3.org/2000/svg" width="300" height="148">
  <rect width="300" height="148" fill="#0a0a0a" rx="8" stroke="#00ff4133" stroke-width="1"/>

  <!-- header -->
  <text x="18" y="22" font-family="monospace" font-size="10" fill="#00aa2a">GitHub Stats</text>
  <text x="282" y="22" text-anchor="end" font-family="monospace" font-size="10" fill="#00ff41">supernova0866</text>
  <line x1="18" y1="28" x2="282" y2="28" stroke="#00ff4133" stroke-width="1"/>

  <!-- stat rows -->
  
  <text x="18" y="50" font-family="monospace" font-size="11" fill="#00aa2a">Total commits</text>
  <text x="282" y="50" text-anchor="end" font-family="monospace" font-size="11" fill="#00ff41">{{commits}}</text>
  <line x1="18" y1="56" x2="282" y2="56" stroke="#00ff4133" stroke-width="1" opacity="0.4"/>
  
  <text x="18" y="76" font-family="monospace" font-size="11" fill="#00aa2a">Pull requests</text>
  <text x="282" y="76" text-anchor="end" font-family="monospace" font-size="11" fill="#00ff41">{{prs}}</text>
  <line x1="18" y1="82" x2="282" y2="82" stroke="#00ff4133" stroke-width="1" opacity="0.4"/>
  
  <text x="18" y="102" font-family="monospace" font-size="11" fill="#00aa2a">Issues opened</text>
  <text x="282" y="102" text-anchor="end" font-family="monospace" font-size="11" fill="#00ff41">{{issues}}</text>
  <line x1="18" y1="108" x2="282" y2="108" stroke="#00ff4133" stroke-width="1" opacity="0.4"/>
  
  <text x="18" y="128" font-family="monospace" font-size="11" fill="#00aa2a">Stars earned</text>
  <text x="282" y="128" text-anchor="end" font-family="monospace" font-size="11" fill="#00ff41">{{stars}}</text>
  <line x1="18" y1="134" x2="282" y2="134" stroke="#00ff4133" stroke-width="1" opacity="0.4"/>

  <!-- live indicator -->
  <circle cx="22" cy="140" r="3" fill="#00ff41">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="30" y="144" font-family="monospace" font-size="8" fill="#00ff41">↻ live via GitHub API</text>
</svg>