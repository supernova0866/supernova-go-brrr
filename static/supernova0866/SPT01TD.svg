<svg viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg" width="300" height="130">
  <rect width="300" height="130" fill="#161b22" rx="8" stroke="#21262d" stroke-width="1"/>

  <!-- Spotify green accent bar -->
  <rect x="0" y="0" width="300" height="3" rx="2" fill="#1DB954"/>

  <!-- album art -->
  <clipPath id="art-clip">
    <rect x="14" y="14" width="52" height="52" rx="6"/>
  </clipPath>
  <image href="{{album_art}}" x="14" y="14" width="52" height="52"
    clip-path="url(#art-clip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- NOW PLAYING label -->
  <text x="76" y="26" font-family="monospace" font-size="9"
    fill="#1DB954" letter-spacing="0.5">NOW PLAYING</text>

  <!-- track + artist + album -->
  <text x="76" y="42" font-family="monospace" font-size="12"
    fill="#e6edf3" font-weight="700">{{track}}</text>
  <text x="76" y="56" font-family="monospace" font-size="10"
    fill="#7d8590">{{artist}}</text>
  <text x="76" y="68" font-family="monospace" font-size="9"
    fill="#7d8590">{{album}}</text>

  <!-- progress bar -->
  <rect x="14" y="80" width="272" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="80" width="{{progress_w}}" height="4" rx="2" fill="#1DB954"/>
  <circle cx="14" cy="82" r="5" fill="#1DB954"/>

  <!-- timestamps -->
  <text x="14" y="96" font-family="monospace" font-size="8"
    fill="#7d8590">{{elapsed}}</text>
  <text x="286" y="96" text-anchor="end" font-family="monospace" font-size="8"
    fill="#7d8590">{{duration}}</text>

  <!-- EQ bars (animated) -->
  
  <rect x="14" y="104" width="3" height="12" rx="1" fill="#1DB954">
    <animate attributeName="height" values="4;12;6;10;4" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="112;104;110;106;112" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="19" y="104" width="3" height="12" rx="1" fill="#1DB954">
    <animate attributeName="height" values="12;4;10;6;12" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="104;112;106;110;104" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="24" y="104" width="3" height="12" rx="1" fill="#1DB954">
    <animate attributeName="height" values="8;12;4;12;8" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="108;104;112;104;108" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- live label -->
  <text x="34" y="115" font-family="monospace" font-size="8"
    fill="#7d8590">last played</text>
  <text x="286" y="115" text-anchor="end" font-family="monospace" font-size="8"
    fill="#58a6ff">↻ live via Spotify API</text>
</svg>